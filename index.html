<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Personal Website</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    background:linear-gradient(135deg,#87CEEB,#FFB6C1);
    overflow:hidden;
}

/* Top Navigation */
.navbar{
    width:100%;
    display:flex;
    justify-content:flex-end;
    align-items:center;
    padding:20px 30px;
}

/* Hamburger */
.menu-btn{
    font-size:35px;
    cursor:pointer;
    color:white;
    user-select:none;
}

/* Dropdown */
.dropdown{
    position:absolute;
    top:70px;
    right:30px;
    background:white;
    width:180px;
    border-radius:12px;
    display:none;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

.dropdown a{
    display:block;
    padding:15px;
    text-decoration:none;
    color:#333;
    transition:.3s;
}

.dropdown a:hover{
    background:#f1f1f1;
}

/* Sidebar */
.sidebar{
    position:absolute;
    top:100px;
    left:20px;
    width:220px;
}

.sidebar ul{
    list-style:none;
}

.sidebar li{
    background:rgba(255,255,255,.25);
    backdrop-filter:blur(10px);
    color:white;
    margin:15px 0;
    padding:15px;
    border-radius:12px;
    cursor:pointer;
    transition:.3s;
    font-weight:bold;
}

.sidebar li:hover{
    background:white;
    color:#ff4da6;
    transform:translateX(10px);
}

/* Center Content */
.center{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

.center h1{
    font-size:55px;
    color:white;
    text-shadow:2px 2px 10px rgba(0,0,0,.3);
    margin-bottom:20px;
}

.center p{
    color:white;
    font-size:20px;
}

@media(max-width:768px){

.sidebar{
    position:relative;
    width:90%;
    margin:auto;
    top:20px;
    left:0;
}

.center h1{
    font-size:38px;
}

}
</style>

</head>

<body>

<div class="navbar">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>

    <div class="dropdown" id="menu">
        <a href="#">Resume</a>
        <a href="#">Certificates</a>
    </div>
</div>

<div class="sidebar">
    <ul>
        <li>📄 Resume</li>
        <li>💼 Professional</li>
        <li>🎯 Hobbies</li>
        <li>ℹ️ About Us</li>
    </ul>
</div>

<div class="center">
    <h1>WELCOME TO THE BOARD</h1>
    <p>Explore my Resume, Professional Profile, Hobbies, and Certificates.</p>
</div>

<script>

function toggleMenu(){
    var menu=document.getElementById("menu");

    if(menu.style.display==="block"){
        menu.style.display="none";
    }else{
        menu.style.display="block";
    }
}

window.onclick=function(e){

if(!e.target.matches('.menu-btn')){
document.getElementById("menu").style.display="none";
}

}

</script>

</body>
</html>
